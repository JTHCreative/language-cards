<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480">
  <!-- 8 stripes: white, red, white, blue, white, red, white, blue -->
  <rect width="640" height="60" y="0" fill="#fff"/>
  <rect width="640" height="60" y="60" fill="#BD0728"/>
  <rect width="640" height="60" y="120" fill="#fff"/>
  <rect width="640" height="60" y="180" fill="#002868"/>
  <rect width="640" height="60" y="240" fill="#fff"/>
  <rect width="640" height="60" y="300" fill="#BD0728"/>
  <rect width="640" height="60" y="360" fill="#fff"/>
  <rect width="640" height="60" y="420" fill="#002868"/>
  <!-- Union Jack canton -->
  <rect width="256" height="240" fill="#002868"/>
  <!-- White saltire (diagonal cross) -->
  <path d="M0,0 L256,240 M256,0 L0,240" stroke="#fff" stroke-width="28"/>
  <!-- Red saltire -->
  <path d="M0,0 L256,240" stroke="#BD0728" stroke-width="14" transform="translate(2,0)"/>
  <path d="M256,0 L0,240" stroke="#BD0728" stroke-width="14" transform="translate(-2,0)"/>
  <!-- White cross -->
  <rect x="112" y="0" width="32" height="240" fill="#fff"/>
  <rect x="0" y="104" width="256" height="32" fill="#fff"/>
  <!-- Red cross -->
  <rect x="118" y="0" width="20" height="240" fill="#BD0728"/>
  <rect x="0" y="110" width="256" height="20" fill="#BD0728"/>
</svg>
